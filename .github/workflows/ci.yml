name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: hims
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: demo-pat-reg
    env:
      NX_NO_CLOUD: 'true'
      NX_BASE: ${{ github.event.pull_request.base.sha }}
      NX_HEAD: ${{ github.event.pull_request.head.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Ensure PR branch includes latest base branch
        if: github.event_name == 'pull_request'
        env:
          CI_BASE_REF: ${{ github.base_ref }}
        run: bun run ci:check-base-sync

      - name: Static analysis
        run: bun run ci:affected:static-analysis

      - name: Typecheck
        run: bun run ci:affected:typecheck

      - name: Unit tests
        run: bun run ci:affected:test:unit

      - name: Coverage gate
        run: bun run ci:affected:test:coverage

      - name: Integration tests
        run: bun run ci:affected:test:integration



      - name: Prepare Test Database
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/hims
        run: bun run db:push

      - name: E2E Tests (Step 8)
        run: bun run ci:affected:test:e2e

      - name: Upload E2E Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}
          path: |
            demo-pat-reg/dist/playwright-report
            demo-pat-reg/dist/test-results
            demo-pat-reg/**/playwright-report/
            demo-pat-reg/**/test-results/
          if-no-files-found: ignore


