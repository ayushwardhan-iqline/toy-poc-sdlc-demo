name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      NX_NO_CLOUD: 'true'
      NX_BASE: ${{ github.event.pull_request.base.sha }}
      NX_HEAD: ${{ github.event.pull_request.head.sha }}
      OPENCODE_MODEL: ${{ secrets.OPENCODE_MODEL || vars.OPENCODE_MODEL || 'opencode/minimax-m2.5-free' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          if [ -f demo-pat-reg/package.json ]; then cd demo-pat-reg; fi
          bun install --frozen-lockfile

      - name: Install OpenCode CLI
        run: npm install --global opencode-ai@1.2.24

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Ensure PR branch includes latest base branch
        if: github.event_name == 'pull_request'
        env:
          CI_BASE_REF: ${{ github.base_ref }}
        run: |
          if [ -f demo-pat-reg/package.json ]; then cd demo-pat-reg; fi
          bun run ci:check-base-sync

      - name: Static analysis
        run: |
          if [ -f demo-pat-reg/package.json ]; then cd demo-pat-reg; fi
          bun run ci:affected:static-analysis

      - name: Typecheck
        run: |
          if [ -f demo-pat-reg/package.json ]; then cd demo-pat-reg; fi
          bun run ci:affected:typecheck

      - name: Unit tests
        run: |
          if [ -f demo-pat-reg/package.json ]; then cd demo-pat-reg; fi
          bun run ci:affected:test:unit

      - name: Coverage gate
        run: |
          if [ -f demo-pat-reg/package.json ]; then cd demo-pat-reg; fi
          bun run ci:affected:test:coverage

      - name: Integration tests
        run: |
          if [ -f demo-pat-reg/package.json ]; then cd demo-pat-reg; fi
          bun run ci:affected:test:integration

      - name: AI Code Review (Step 7)
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          if [ -f demo-pat-reg/package.json ]; then cd demo-pat-reg; fi
          bun run ci:affected:ai:review

      - name: E2E Tests (Step 8)
        run: |
          if [ -f demo-pat-reg/package.json ]; then cd demo-pat-reg; fi
          bun run ci:affected:test:e2e

      - name: Upload E2E Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}
          path: |
            demo-pat-reg/dist/playwright-report
            demo-pat-reg/dist/test-results
            demo-pat-reg/**/playwright-report/
            demo-pat-reg/**/test-results/
          if-no-files-found: ignore

      - name: Detect Playwright Reports
        if: success()
        id: detect_playwright
        run: |
          if [ -f demo-pat-reg/package.json ]; then cd demo-pat-reg; fi
          if find . -type f \( -path "*/playwright-report/index.html" -o -path "*/playwright-report/*.json" \) | grep -q .; then
            echo "has_reports=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
          fi

      - name: AI E2E Judge (Step 8.5)
        if: ${{ success() && steps.detect_playwright.outputs.has_reports == 'true' }}
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          if [ -f demo-pat-reg/package.json ]; then cd demo-pat-reg; fi
          bun run ci:affected:ai:judge-e2e

      - name: Skip AI E2E Judge (No Playwright reports)
        if: ${{ success() && steps.detect_playwright.outputs.has_reports != 'true' }}
        run: |
          echo "Skipping Step 8.5: no Playwright report files were produced by Step 8."
