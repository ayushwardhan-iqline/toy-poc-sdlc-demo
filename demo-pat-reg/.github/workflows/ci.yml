name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      NX_NO_CLOUD: 'true'
      NX_BASE: ${{ github.event.pull_request.base.sha }}
      NX_HEAD: ${{ github.event.pull_request.head.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Ensure PR branch includes latest base branch
        if: github.event_name == 'pull_request'
        env:
          CI_BASE_REF: ${{ github.base_ref }}
        run: bun run ci:check-base-sync

      - name: Static analysis
        run: bun run ci:affected:static-analysis

      - name: Typecheck
        run: bun run ci:affected:typecheck

      - name: Unit tests
        run: bun run ci:affected:test:unit

      - name: Coverage gate
        run: bun run ci:affected:test:coverage

      - name: Integration tests
        run: bun run ci:affected:test:integration
